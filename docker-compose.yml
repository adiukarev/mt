x-airflow-env: &airflow-env
  AIRFLOW_HOME: /opt/airflow
  AIRFLOW__API__SECRET_KEY: 7nQ4sK1xVz8mLp2cHd5rTy9bWa3uJe6N
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
  AIRFLOW__API_AUTH__JWT_SECRET: 5sY0mJdJk8PqL2nV7xRbC4tW9aHzE1uN
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mt:mt@postgres:5432/airflow
  AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/mt/dags
  AIRFLOW__CORE__FERNET_KEY: 0v5zS8q5j6HvM0tW8w5tXg7kC4iL2nYq
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
  AIRFLOW__DAG_PROCESSOR__PARSING_PROCESSES: "1"
  AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL: "120"
  AIRFLOW__DAG_PROCESSOR__BUNDLE_REFRESH_CHECK_INTERVAL: "30"
  AIRFLOW__DAG_PROCESSOR__PRINT_STATS_INTERVAL: "0"
  AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: UTC
  MLFLOW_TRACKING_URI: http://mlflow:5050
  MT_MLFLOW_ENABLED: "1"
  MT_MLFLOW_EXPERIMENT_PREFIX: mt
  MT_PREDICT_USE_SAVED_ARTIFACT: "0"
  PYTHONPATH: /opt/mt/src

x-airflow-base: &airflow-base
  build:
    context: .
    dockerfile: docker/airflow.dockerfile
  entrypoint: []
  environment: *airflow-env
  working_dir: /opt/mt
  volumes:
    - ./src:/opt/mt/src
    - ./dags:/opt/mt/dags
    - ./manifests:/opt/mt/manifests
    - ./data:/opt/mt/data
    - ./mlruns:/opt/mt/mlruns
    - airflow_logs:/opt/airflow/logs
  networks:
    - mt_internal

x-airflow-runtime: &airflow-runtime
  <<: *airflow-base
  depends_on:
    airflow-init:
      condition: service_completed_successfully
  shm_size: "1gb"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mt
      POSTGRES_PASSWORD: mt
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/10-create-app-dbs.sql:ro
    networks:
      - mt_internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mt -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /opt/mt
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5050"
      - --allowed-hosts
      - localhost,localhost:5050,127.0.0.1,127.0.0.1:5050,mlflow,mlflow:5050
      - --backend-store-uri
      - postgresql+psycopg2://mt:mt@postgres:5432/mlflow
      - --serve-artifacts
      - --artifacts-destination
      - file:///opt/mt/mlruns
    ports:
      - "5050:5050"
    shm_size: "1gb"
    volumes:
      - ./mlruns:/opt/mt/mlruns
    networks:
      - mt_internal

  airflow-init:
    <<: *airflow-base
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    command:
      - bash
      - -lc
      - mkdir -p /opt/mt/mlruns /opt/airflow/logs && airflow db migrate

  airflow-api-server:
    <<: *airflow-runtime
    command: ["airflow", "api-server", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-runtime
    command: ["airflow", "scheduler"]

  airflow-dag-processor:
    <<: *airflow-runtime
    command: ["airflow", "dag-processor"]

volumes:
  postgres_data:
  airflow_logs:

networks:
  mt_internal:
    name: mt_internal
